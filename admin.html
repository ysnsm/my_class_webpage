<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理后台 · 菡萏班</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 登录遮罩层样式 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            margin-bottom: 20px;
            color: #2c2b28;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            margin: 20px 0;
            border-radius: 40px;
            border: 1px solid #e6d9ce;
            font-size: 1rem;
        }
        .login-card button {
            background: #E88D67;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }
        .error-msg {
            color: #d9534f;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        #adminContent {
            display: none;
        }
        /* 后台表单样式（后备） */
        .admin-container { max-width: 1200px; margin: 100px auto 60px; padding: 0 28px; }
        .admin-card { background: white; border-radius: 32px; padding: 32px; margin-bottom: 40px; box-shadow: 0 12px 28px rgba(0,0,0,0.05); border: 1px solid #f0e4d8; }
        .form-group { margin-bottom: 24px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 8px; color: #4b3e32; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border-radius: 20px; border: 1px solid #e6d9ce; font-family: inherit; background: #fefaf5; }
        .form-group textarea { min-height: 80px; }
        .btn-group { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 20px; }
        .btn { padding: 10px 24px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; background: #f0e4d8; transition: 0.2s; }
        .btn-primary { background: #E88D67; color: white; }
        .btn-primary:hover { background: #cf7350; }
        .btn-outline { background: transparent; border: 1px solid #d4c3b2; }
        .member-item, .honor-item, .gallery-item { background: #fef8f2; padding: 16px; border-radius: 20px; margin-bottom: 16px; }
        .info-badge { background: #e5f6e9; padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; display: inline-block; margin-bottom: 20px; }
        .hint { font-size: 12px; margin-top: 12px; color: #8f8576; }
        .logout-btn {
            background: transparent;
            border: 1px solid #d4c3b2;
            color: #a5532f;
            margin-left: 15px;
        }
        .logout-btn:hover {
            background: #f0e4d8;
        }
    </style>
</head>
<body>

<!-- 登录遮罩层 -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2><i class="fas fa-lock"></i> 管理员登录</h2>
        <input type="password" id="adminPassword" placeholder="请输入管理密码" autofocus>
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- 后台管理界面（初始隐藏） -->
<div id="adminContent">
    <div class="navbar" style="position: sticky;">
        <div class="nav-container">
            <div class="logo"><h2>⚙️ 管理后台</h2><p>菡萏班配置中心</p></div>
            <ul class="nav-links">
                <li><a href="index.html" target="_blank">🏠 访问主页</a></li>
                <li><a href="#" id="exportConfigBtn">📥 导出JSON</a></li>
                <li><button id="logoutBtn" class="btn logout-btn">🚪 退出登录</button></li>
            </ul>
        </div>
    </div>
    <div class="admin-container">
        <div class="info-badge"><i class="fas fa-save"></i> 编辑以下信息，点击「保存配置到云端」</div>
        <div class="admin-card">
            <h2><i class="fas fa-school"></i> 基础信息</h2>
            <div class="form-group"><label>班级全称</label><input type="text" id="className" placeholder="红谷一小六(13)班"></div>
            <div class="form-group"><label>班级别名（菡萏班）</label><input type="text" id="classAlias" placeholder="菡萏班"></div>
            <div class="form-group"><label>班级口号</label><input type="text" id="classSlogan" placeholder="含苞待放，志在凌云"></div>
            <div class="form-group"><label>班主任寄语</label><textarea id="teacherMessage"></textarea></div>
            <div class="form-group"><label>班级人数</label><input type="number" id="studentCount"></div>
            <div class="form-group"><label>教师人数</label><input type="number" id="teacherCount"></div>
            <div class="form-group"><label>背景音乐URL</label><input type="text" id="bgmUrl" placeholder="assets/audio/class-bgm.mp3"></div>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-users"></i> 成员风采 (可增删)</h3>
            <div id="membersList"></div>
            <button class="btn btn-outline" id="addMemberBtn"><i class="fas fa-plus"></i> 添加成员</button>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-trophy"></i> 荣誉奖项</h3>
            <div id="honorList"></div>
            <button class="btn btn-outline" id="addHonorBtn"><i class="fas fa-plus"></i> 添加荣誉</button>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-images"></i> 精彩瞬间 (图片/视频)</h3>
            <div id="galleryList"></div>
            <button class="btn btn-outline" id="addGalleryBtn"><i class="fas fa-plus"></i> 添加媒体项</button>
            <p class="hint">提示：type为image或video，视频请放置于assets/video/，图片放置于assets/images/</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="saveToCloudBtn">💾 保存配置到云端</button>
            <button class="btn" id="resetDefaultBtn">↺ 恢复默认配置</button>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // 所有逻辑统一在此，记住登录状态（localStorage 存储，1小时有效）
    // ------------------------------------------------------------------
    const API_BASE = 'https://api.mycw.ysnsm2899.ggff.net/api';
    let currentToken = null;
    let configData = null;

    // 默认配置
    const defaultConfig = {
        className: "红谷一小六（13）班",
        classAlias: "菡萏班",
        classSlogan: "灼灼荷花瑞，亭亭出水中",
        teacherMessage: "愿你们如清荷，不染纤尘，中通外直，香远益清。",
        studentCount: 46,
        teacherCount: 12,
        bgmUrl: "assets/audio/class-bgm.mp3",
        aboutStory: "红谷一小六（13）班又名“菡萏班”，菡萏即荷花花苞，象征纯洁与希望。46朵小荷在老师们的浇灌下茁壮成长。",
        members: [
            { name: "章一诺", role: "班长", bio: "足球校队", icon: "fa-crown" },
            { name: "贾思睿", role: "无职位", bio: "五年级期末考年级第一", icon: "fa-crown" }
        ],
        honors: [
            { title: "2025年数学节", desc: "魔方个人及团体赛荣获第一", icon: "fa-trophy" }
        ],
        gallery: [
            { type: "image", url: "assets/images/lotus-festival.jpg", caption: "荷花节展示" },
            { type: "image", url: "assets/images/class-meeting.jpg", caption: "主题班会" },
            { type: "video", url: "assets/video/graduation-memory.mp4", caption: "成长记忆" }
        ]
    };

    // ----- 辅助函数 -----
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function collectBasicInfo() {
        configData.className = document.getElementById('className').value;
        configData.classAlias = document.getElementById('classAlias').value;
        configData.classSlogan = document.getElementById('classSlogan').value;
        configData.teacherMessage = document.getElementById('teacherMessage').value;
        configData.studentCount = parseInt(document.getElementById('studentCount').value) || 0;
        configData.teacherCount = parseInt(document.getElementById('teacherCount').value) || 0;
        configData.bgmUrl = document.getElementById('bgmUrl').value;
    }

    function fillForm() {
        document.getElementById('className').value = configData.className || '';
        document.getElementById('classAlias').value = configData.classAlias || '';
        document.getElementById('classSlogan').value = configData.classSlogan || '';
        document.getElementById('teacherMessage').value = configData.teacherMessage || '';
        document.getElementById('studentCount').value = configData.studentCount || 46;
        document.getElementById('teacherCount').value = configData.teacherCount || 12;
        document.getElementById('bgmUrl').value = configData.bgmUrl || '';
        renderMembers();
        renderHonors();
        renderGallery();
    }

    function renderMembers() {
        const container = document.getElementById('membersList');
        if (!container) return;
        container.innerHTML = '';
        (configData.members || []).forEach((m, idx) => {
            const div = document.createElement('div');
            div.className = 'member-item';
            div.innerHTML = `
                <input placeholder="姓名" value="${escapeHtml(m.name)}" data-field="name" data-index="${idx}">
                <input placeholder="职务" value="${escapeHtml(m.role)}" data-field="role" data-index="${idx}">
                <input placeholder="简介" value="${escapeHtml(m.bio)}" data-field="bio" data-index="${idx}">
                <input placeholder="图标类(fa-xxx)" value="${escapeHtml(m.icon)}" data-field="icon" data-index="${idx}">
                <button class="btn-outline" data-remove idx="${idx}">删除</button>
            `;
            container.appendChild(div);
        });
        attachArrayEvents('members');
    }

    function renderHonors() {
        const container = document.getElementById('honorList');
        if (!container) return;
        container.innerHTML = '';
        (configData.honors || []).forEach((h, idx) => {
            const div = document.createElement('div');
            div.className = 'honor-item';
            div.innerHTML = `
                <input placeholder="荣誉名称" value="${escapeHtml(h.title)}" data-field="title" data-idx="${idx}">
                <input placeholder="描述" value="${escapeHtml(h.desc)}" data-field="desc" data-idx="${idx}">
                <input placeholder="图标" value="${escapeHtml(h.icon)}" data-field="icon" data-idx="${idx}">
                <button class="btn-outline" data-remove idx="${idx}">删除</button>
            `;
            container.appendChild(div);
        });
        attachArrayEvents('honors');
    }

    function renderGallery() {
        const container = document.getElementById('galleryList');
        if (!container) return;
        container.innerHTML = '';
        (configData.gallery || []).forEach((g, idx) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <select data-field="type" data-idx="${idx}">
                    <option ${g.type === 'image' ? 'selected' : ''}>image</option>
                    <option ${g.type === 'video' ? 'selected' : ''}>video</option>
                </select>
                <input placeholder="URL" value="${escapeHtml(g.url)}" data-field="url" data-idx="${idx}">
                <input placeholder="说明" value="${escapeHtml(g.caption)}" data-field="caption" data-idx="${idx}">
                <button class="btn-outline" data-remove idx="${idx}">删除</button>
            `;
            container.appendChild(div);
        });
        attachArrayEvents('gallery');
    }

    function attachArrayEvents(type) {
        // 删除按钮
        document.querySelectorAll(`#${type}List button[data-remove]`).forEach(btn => {
            btn.onclick = () => {
                const idx = parseInt(btn.getAttribute('idx'));
                configData[type].splice(idx, 1);
                renderMembers();
                renderHonors();
                renderGallery();
            };
        });
        // 实时编辑
        const inputs = document.querySelectorAll(`#membersList input, #honorList input, #galleryList input, #galleryList select`);
        inputs.forEach(inp => {
            inp.onchange = (e) => {
                const idx = inp.getAttribute('data-index') || inp.getAttribute('data-idx');
                const field = inp.getAttribute('data-field');
                if (inp.closest('#membersList') && idx !== null) {
                    configData.members[idx][field] = inp.value;
                } else if (inp.closest('#honorList')) {
                    configData.honors[idx][field] = inp.value;
                } else if (inp.closest('#galleryList')) {
                    configData.gallery[idx][field] = inp.value;
                }
            };
        });
    }

    // ----- API 交互 -----
    async function loadConfigFromCloud() {
        try {
            const resp = await fetch(`${API_BASE}/config`);
            if (resp.ok) return await resp.json();
        } catch (e) { console.warn(e); }
        return null;
    }

    async function saveConfigToCloud(config, token) {
        try {
            const resp = await fetch(`${API_BASE}/config`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': token
                },
                body: JSON.stringify(config)
            });
            return resp.ok;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    async function verifyPassword(password) {
        try {
            const resp = await fetch(`${API_BASE}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await resp.json();
            return data.success === true;
        } catch {
            return false;
        }
    }

    // ----- 初始化后台 -----
    async function initAdmin(token) {
        currentToken = token;
        let cloudConfig = await loadConfigFromCloud();
        if (cloudConfig) {
            configData = cloudConfig;
            localStorage.setItem('handan_class_config', JSON.stringify(configData));
        } else {
            const local = localStorage.getItem('handan_class_config');
            if (local) {
                configData = JSON.parse(local);
            } else {
                configData = JSON.parse(JSON.stringify(defaultConfig));
            }
        }
        fillForm();
        bindEvents();
    }

    function bindEvents() {
        // 保存按钮
        const saveBtn = document.getElementById('saveToCloudBtn');
        if (saveBtn) {
            saveBtn.onclick = async () => {
                if (!currentToken) {
                    alert('未登录，请刷新页面重新登录');
                    return;
                }
                collectBasicInfo();
                const ok = await saveConfigToCloud(configData, currentToken);
                if (ok) {
                    alert('✅ 配置已保存到云端！所有访问者将看到最新内容。');
                    localStorage.setItem('handan_class_config', JSON.stringify(configData));
                } else {
                    alert('❌ 保存失败，请检查网络或 Worker');
                }
            };
        }

        // 重置默认配置
        const resetBtn = document.getElementById('resetDefaultBtn');
        if (resetBtn) {
            resetBtn.onclick = () => {
                if (confirm('⚠️ 确定要重置所有配置为默认值吗？未保存的更改将会丢失。')) {
                    configData = JSON.parse(JSON.stringify(defaultConfig));
                    fillForm();
                    alert('已恢复默认配置。请点击“保存配置到云端”使更改生效。');
                }
            };
        }

        // 导出配置
        const exportBtn = document.getElementById('exportConfigBtn');
        if (exportBtn) {
            exportBtn.onclick = () => {
                collectBasicInfo();
                const dataStr = JSON.stringify(configData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'config.json';
                a.click();
                URL.revokeObjectURL(url);
                alert('导出 config.json 成功');
            };
        }

        // 添加成员
        const addMemberBtn = document.getElementById('addMemberBtn');
        if (addMemberBtn) {
            addMemberBtn.onclick = () => {
                configData.members.push({ name: "新同学", role: "职位", bio: "自我介绍", icon: "fa-smile" });
                renderMembers();
            };
        }
        // 添加荣誉
        const addHonorBtn = document.getElementById('addHonorBtn');
        if (addHonorBtn) {
            addHonorBtn.onclick = () => {
                configData.honors.push({ title: "新荣誉", desc: "描述", icon: "fa-award" });
                renderHonors();
            };
        }
        // 添加画廊
        const addGalleryBtn = document.getElementById('addGalleryBtn');
        if (addGalleryBtn) {
            addGalleryBtn.onclick = () => {
                configData.gallery.push({ type: "image", url: "assets/images/new.jpg", caption: "新瞬间" });
                renderGallery();
            };
        }

        // 退出登录
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.onclick = () => {
                localStorage.removeItem('admin_session');
                sessionStorage.clear();
                location.reload();
            };
        }
    }

    // ----- 登录与自动登录逻辑 -----
    const loginOverlay = document.getElementById('loginOverlay');
    const adminContent = document.getElementById('adminContent');
    const loginBtn = document.getElementById('loginBtn');
    const adminPassword = document.getElementById('adminPassword');
    const loginError = document.getElementById('loginError');

    // 保存登录信息到 localStorage（1小时有效）
    function saveSession(password) {
        const sessionData = {
            token: password,
            expire: Date.now() + 60 * 60 * 1000  // 1小时后过期
        };
        localStorage.setItem('admin_session', JSON.stringify(sessionData));
    }

    function getSavedPassword() {
        const raw = localStorage.getItem('admin_session');
        if (!raw) return null;
        try {
            const session = JSON.parse(raw);
            if (session.expire && session.expire > Date.now()) {
                return session.token;
            } else {
                localStorage.removeItem('admin_session');
                return null;
            }
        } catch (e) {
            return null;
        }
    }

    async function attemptAutoLogin() {
        const savedPwd = getSavedPassword();
        if (!savedPwd) return false;
        const isValid = await verifyPassword(savedPwd);
        if (isValid) {
            currentToken = savedPwd;
            loginOverlay.style.display = 'none';
            adminContent.style.display = 'block';
            await initAdmin(savedPwd);
            return true;
        } else {
            localStorage.removeItem('admin_session');
            return false;
        }
    }

    async function manualLogin(password) {
        const isValid = await verifyPassword(password);
        if (isValid) {
            saveSession(password);
            currentToken = password;
            loginOverlay.style.display = 'none';
            adminContent.style.display = 'block';
            await initAdmin(password);
        } else {
            loginError.innerText = '密码错误，请重试';
        }
    }

    // 页面加载时首先尝试自动登录
    (async function() {
        const autoSuccess = await attemptAutoLogin();
        if (!autoSuccess) {
            loginOverlay.style.display = 'flex';
            adminContent.style.display = 'none';
        }
    })();

    // 绑定手动登录事件
    loginBtn.addEventListener('click', async () => {
        const pwd = adminPassword.value;
        if (!pwd) {
            loginError.innerText = '请输入密码';
            return;
        }
        await manualLogin(pwd);
    });
    adminPassword.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const pwd = adminPassword.value;
            if (!pwd) {
                loginError.innerText = '请输入密码';
                return;
            }
            await manualLogin(pwd);
        }
    });
</script>
</body>
</html>
