<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理后台 · 菡萏班</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 登录遮罩层 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            margin-bottom: 20px;
            color: #2c2b28;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            margin: 20px 0;
            border-radius: 40px;
            border: 1px solid #e6d9ce;
            font-size: 1rem;
        }
        .login-card button {
            background: #E88D67;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }
        .error-msg {
            color: #d9534f;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        #adminContent {
            display: none;
        }
    </style>
</head>
<body>

<!-- 登录遮罩层 -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2><i class="fas fa-lock"></i> 管理员登录</h2>
        <input type="password" id="adminPassword" placeholder="请输入管理密码" autofocus>
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- 真正的后台管理内容（初始隐藏） -->
<div id="adminContent">
    <div class="navbar" style="position: sticky;">
        <div class="nav-container">
            <div class="logo"><h2>⚙️ 管理后台</h2><p>菡萏班配置中心</p></div>
            <ul class="nav-links">
                <li><a href="index.html" target="_blank">🏠 访问主页</a></li>
                <li><a href="#" id="exportConfigBtn">📥 导出JSON</a></li>
            </ul>
        </div>
    </div>
    <div class="admin-container">
        <div class="info-badge"><i class="fas fa-save"></i> 编辑以下信息，点击「保存配置到云端」</div>
        <div class="admin-card">
            <h2><i class="fas fa-school"></i> 基础信息</h2>
            <div class="form-group"><label>班级全称</label><input type="text" id="className" placeholder="红谷一小六(13)班"></div>
            <div class="form-group"><label>班级别名（菡萏班）</label><input type="text" id="classAlias" placeholder="菡萏班"></div>
            <div class="form-group"><label>班级口号</label><input type="text" id="classSlogan" placeholder="含苞待放，志在凌云"></div>
            <div class="form-group"><label>班主任寄语</label><textarea id="teacherMessage"></textarea></div>
            <div class="form-group"><label>班级人数</label><input type="number" id="studentCount"></div>
            <div class="form-group"><label>教师人数</label><input type="number" id="teacherCount"></div>
            <div class="form-group"><label>背景音乐URL</label><input type="text" id="bgmUrl" placeholder="assets/audio/class-bgm.mp3"></div>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-users"></i> 成员风采 (可增删)</h3>
            <div id="membersList"></div>
            <button class="btn btn-outline" id="addMemberBtn"><i class="fas fa-plus"></i> 添加成员</button>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-trophy"></i> 荣誉奖项</h3>
            <div id="honorList"></div>
            <button class="btn btn-outline" id="addHonorBtn"><i class="fas fa-plus"></i> 添加荣誉</button>
        </div>
        <div class="admin-card">
            <h3><i class="fas fa-images"></i> 精彩瞬间 (图片/视频)</h3>
            <div id="galleryList"></div>
            <button class="btn btn-outline" id="addGalleryBtn"><i class="fas fa-plus"></i> 添加媒体项</button>
            <p class="hint" style="font-size:12px; margin-top:12px;">提示：type为image或video，视频请放置于assets/video/，图片放置于assets/images/或外部链接</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="saveToCloudBtn">💾 保存配置到云端</button>
            <button class="btn" id="resetDefaultBtn">↺ 重置默认配置</button>
        </div>
    </div>
</div>

<!-- 注意：这里只引入 admin.js，不要在内联脚本中再次声明 API_BASE -->
<script src="js/admin.js"></script>
<script>
    // 登录逻辑 - 使用独立的变量名，避免与 admin.js 中的冲突
    (function() {
        const LOGIN_API_BASE = 'https://api.mycw.ysnsm2899.ggff.net/api';
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('adminPassword');
        const errorDiv = document.getElementById('loginError');
        const overlay = document.getElementById('loginOverlay');
        const content = document.getElementById('adminContent');

        async function handleLogin() {
            const password = passwordInput.value;
            if (!password) {
                errorDiv.innerText = '请输入密码';
                return;
            }
            try {
                const resp = await fetch(`${LOGIN_API_BASE}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                const data = await resp.json();
                if (data.success) {
                    // 登录成功，隐藏遮罩，显示管理界面，并传递 token 给 admin.js
                    overlay.style.display = 'none';
                    content.style.display = 'block';
                    // 将密码传递给 admin.js 中的全局函数（如果有）
                    if (typeof window.setAdminToken === 'function') {
                        window.setAdminToken(password);
                    } else {
                        // 降级：设置全局变量
                        window.adminToken = password;
                    }
                } else {
                    errorDiv.innerText = '密码错误，请重试';
                }
            } catch (err) {
                errorDiv.innerText = '网络错误，无法验证';
                console.error(err);
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    })();
</script>
</body>
</html>
